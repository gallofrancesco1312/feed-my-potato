services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: feed-my-potato-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # qBittorrent WebUI
      - "8080:8080"
      # qBittorrent torrent traffic
      - "16881:16881"
      - "16881:16881/udp"
      # Radarr
      - "7878:7878"
      # Sonarr
      - "8989:8989"
      # Prowlarr
      - "9696:9696"
      # FlareSolverr
      - "8191:8191"
    volumes:
      - gluetun-config:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${NORDVPN_PRIVATE_KEY}
      - SERVER_COUNTRIES=Italy
      - FIREWALL=on
      - FIREWALL_VPN_INPUT_PORTS=16881
      - FIREWALL_INPUT_PORTS=8989,7878
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - proxy
      - default
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  app:
    image: forgejo.home.potato/ciccio/feed-my-potato:latest
    container_name: feed-my-potato
    volumes:
      - ./config.json:/app/config.json
      - sonarr-config:/service-config/sonarr:ro
      - radarr-config:/service-config/radarr:ro
      - prowlarr-config:/service-config/prowlarr:ro
      - bazarr-config:/service-config/bazarr:ro
    depends_on:
      - radarr
      - sonarr
      - prowlarr
      - qbittorrent
      - bazarr
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.feedmypotato.rule=Host(`feedmypotato.home.potato`)"
      - "traefik.http.routers.feedmypotato.entrypoints=websecure"
      - "traefik.http.routers.feedmypotato.tls=true"
      - "traefik.http.services.feedmypotato.loadbalancer.server.port=3000"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: feed-my-potato-radarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - radarr-config:/config
      - /mnt/data/media:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: feed-my-potato-sonarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - sonarr-config:/config
      - /mnt/data/media:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: feed-my-potato-prowlarr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - prowlarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: feed-my-potato-qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - qbittorrent-config:/config
      - /mnt/data/media/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - WEBUI_PORT=8080
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: feed-my-potato-jellyfin
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - TZ=Europe/Rome
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - /mnt/data/media/movies:/media/movies:ro
      - /mnt/data/media/series:/media/series:ro
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.home.potato`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: feed-my-potato-bazarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - bazarr-config:/config
      - /mnt/data/media:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.home.potato`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: feed-my-potato-flaresolverr
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped

volumes:
  gluetun-config:
  sonarr-config:
  radarr-config:
  prowlarr-config:
  qbittorrent-config:
  jellyfin-config:
  bazarr-config:
  jellyfin-cache:

networks:
  proxy:
    external: true
